<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página Inicial</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background-image: url('sua-imagem-fundo.jpg'); /* TROQUE AQUI */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
        }

        .conteudo {
            background-color: rgba(255, 255, 255, 0.9); /* COR DO CARD */
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        footer {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            text-align: center;
            margin-top: auto;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Sistema</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Produtos Cadastrados</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO CENTRAL -->
    <div class="container my-5">
        <div class="conteudo text-center">

            <h2 class="mb-4 text-primary">Gerenciamento de Produtos</h2>

            <!-- IMAGEM -->
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzIboNxqA1EQv4qn2zF3tmxUdN88d0VmHcXQ&s" 
                class="img-fluid rounded mb-4" 
                alt="Produtos"
                style="max-height: 300px;"> <!-- TROQUE A IMAGEM AQUI -->

            <!-- BOTÃO -->
            <div>
                <a href="#" class="btn btn-primary btn-lg">
                    Cadastrar Produtos
                </a>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 - Sistema de Gerenciamento | Desenvolvido por Vinícius
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
